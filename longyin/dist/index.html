<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>龙胤demo存档修改器</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2c;
      --panel2:#0c1627;
      --border:rgba(255,255,255,.08);
      --muted:rgba(255,255,255,.65);
      --text:rgba(255,255,255,.92);
      --accent:#4da3ff;
      --good:#34d399;
      --warn:#fbbf24;
      --danger:#fb7185;
      --chip:rgba(255,255,255,.07);
      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --r:16px;
      --r2:12px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:var(--font);
      background:radial-gradient(1200px 600px at 25% 10%, rgba(77,163,255,.12), transparent 60%),
                 radial-gradient(1000px 700px at 85% 20%, rgba(52,211,153,.10), transparent 55%),
                 var(--bg);
      color:var(--text);
      overflow:hidden; /* 关键：整页固定一屏，不允许 body 滚动 */
    }

    /* 顶部 */
    .topbar{
      height:76px;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      backdrop-filter: blur(10px);
    }
    .brand{
      display:flex; flex-direction:column; gap:4px;
    }
    .brand .t{font-weight:800; letter-spacing:.5px}
    .brand .d{font-size:12px; color:var(--muted)}
    .actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:9px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:650;
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }
    .btn:hover{background:rgba(255,255,255,.09)}
    .btn.primary{background:rgba(77,163,255,.18); border-color:rgba(77,163,255,.45)}
    .btn.primary:hover{background:rgba(77,163,255,.25)}
    .btn.good{background:rgba(52,211,153,.16); border-color:rgba(52,211,153,.40)}
    .btn.good:hover{background:rgba(52,211,153,.22)}
    .btn.warn{background:rgba(251,191,36,.14); border-color:rgba(251,191,36,.40)}
    .btn.warn:hover{background:rgba(251,191,36,.22)}
    .btn.ghost{background:transparent}
    .pill{
      font-size:12px; padding:6px 10px; border-radius:999px;
      border:1px solid var(--border); background:rgba(255,255,255,.04);
      color:var(--muted);
    }

    /* 主布局 */
    .app{
      height:calc(100vh - 76px);
      display:flex;
      gap:14px;
      padding:14px 14px;
    }
    .left{
      width:360px;
      min-width:320px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .right{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0; /* 允许内部滚动 */
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:var(--r);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .card .hd{
      padding:12px 12px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      background:rgba(255,255,255,.02);
    }
    .card .hd .h{
      font-weight:800;
      letter-spacing:.3px;
      display:flex; gap:10px; align-items:center;
    }
    .card .bd{padding:12px}

    /* 左侧人物列表 */
    .search{
      display:flex; gap:8px; align-items:center;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.02);
    }
    .in{
      flex:1;
      border:1px solid var(--border);
      background:rgba(0,0,0,.25);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      outline:none;
    }
    .in::placeholder{color:rgba(255,255,255,.35)}
    .heroListWrap{
      /* 关键：左侧列表固定高度、内部滚动 */
      flex:1;
      min-height:0;
      overflow:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .heroItem{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:10px 10px;
      cursor:pointer;
      display:flex; flex-direction:column; gap:8px;
    }
    .heroItem:hover{background:rgba(255,255,255,.06)}
    .heroItem.active{
      border-color:rgba(77,163,255,.55);
      box-shadow:0 0 0 2px rgba(77,163,255,.18) inset;
      background:rgba(77,163,255,.08);
    }
    .heroTop{
      display:flex; justify-content:space-between; gap:10px; align-items:center;
    }
    .heroName{
      font-weight:850;
      display:flex; align-items:center; gap:8px;
      min-width:0;
    }
    .heroName .nm{
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:220px;
    }
    .heroName .id{opacity:.65; font-size:12px}
    .heroTags{display:flex; flex-wrap:wrap; gap:6px}
    .chip{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--chip);
      color:rgba(255,255,255,.78);
    }
    .chip.good{border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.10)}
    .chip.warn{border-color:rgba(251,191,36,.35); background:rgba(251,191,36,.10)}
    .chip.danger{border-color:rgba(251,113,133,.35); background:rgba(251,113,133,.10)}
    .chip.gray{opacity:.85}
    .chip.power{margin-left:auto; font-weight:800}

    /* 右侧顶部 tabs */
    .tabs{
      display:flex; gap:8px; align-items:center;
      padding:8px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(255,255,255,.03);
      width:max-content;
    }
    .tab{
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
      font-weight:750;
      color:rgba(255,255,255,.75);
      border:1px solid transparent;
      user-select:none;
    }
    .tab:hover{background:rgba(255,255,255,.06)}
    .tab.active{
      color:var(--text);
      background:rgba(77,163,255,.18);
      border-color:rgba(77,163,255,.45);
    }

    /* 右侧内容区：内部滚动 */
    .mainScroll{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:0;
    }
    .section{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .grid2{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:12px;
    }
    @media (max-width:1100px){
      .left{width:320px}
      .grid2{grid-template-columns:1fr}
    }
    .subcard{
      border:1px solid var(--border);
      border-radius:var(--r);
      background:rgba(0,0,0,.18);
      overflow:hidden;
    }
    .subcard .shd{
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      background:rgba(255,255,255,.02);
    }
    .subcard .sbd{padding:12px}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .label{font-size:12px; color:var(--muted)}
    .field{
      width:100%;
      border:1px solid var(--border);
      background:rgba(0,0,0,.25);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      outline:none;
    }
    .field.small{padding:8px 10px}
    .field.num{width:160px}
    .kv{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .kv3{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
    }
    .switch{
      display:flex; align-items:center; gap:8px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:12px;
      background:rgba(255,255,255,.03);
      user-select:none;
    }
    .switch input{transform:scale(1.1)}
    .help{
      font-size:12px; color:rgba(255,255,255,.58);
      border:1px dashed rgba(255,255,255,.14);
      background:rgba(255,255,255,.02);
      padding:10px 12px; border-radius:12px;
    }

    /* 属性展开区 */
    .fold{
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(255,255,255,.02);
      overflow:hidden;
    }
    .foldHead{
      padding:10px 12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      cursor:pointer;
      user-select:none;
    }
    .foldHead:hover{background:rgba(255,255,255,.04)}
    .foldBody{
      padding:12px;
      border-top:1px solid var(--border);
      display:none;
    }
    .fold.open .foldBody{display:block}
    .foldTitle{
      font-weight:850;
      display:flex; align-items:center; gap:10px;
    }
    .mini{
      font-size:12px; color:var(--muted)
    }
    .chkGrid{
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .chk{
      display:flex; align-items:center; gap:6px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      padding:7px 10px;
      border-radius:999px;
      user-select:none;
    }
    .chk:hover{background:rgba(255,255,255,.06)}
    .editGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .editItem{
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(0,0,0,.20);
      padding:10px 10px;
      display:flex; flex-direction:column; gap:8px;
    }
    .editItem .t{
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      font-weight:850;
    }
    .editItem .t .k{font-size:12px; opacity:.65}
    .pair{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    /* 表格/列表通用 */
    .table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(0,0,0,.18);
    }
    .table th,.table td{
      padding:10px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:left;
      font-size:13px;
      vertical-align:top;
    }
    .table th{color:rgba(255,255,255,.75); font-weight:800; background:rgba(255,255,255,.03)}
    .table tr:last-child td{border-bottom:none}
    .rightActions{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap}

    /* Grid Picker（背包格子） */
    .pickerBar{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      margin-bottom:10px;
    }
    .seg{
      display:flex; gap:6px; align-items:center; flex-wrap:wrap;
      padding:6px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(255,255,255,.03);
    }
    .seg .segBtn{
      padding:7px 10px;
      border-radius:999px;
      cursor:pointer;
      border:1px solid transparent;
      color:rgba(255,255,255,.70);
      font-weight:750;
      user-select:none;
    }
    .seg .segBtn:hover{background:rgba(255,255,255,.06)}
    .seg .segBtn.active{
      background:rgba(77,163,255,.18);
      border-color:rgba(77,163,255,.45);
      color:var(--text);
    }
    .gridPicker{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap:10px;
    }
    .tile{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:10px 10px;
      cursor:pointer;
      min-height:74px;
      display:flex;
      flex-direction:column;
      gap:6px;
      justify-content:center;
    }
    .tile:hover{background:rgba(255,255,255,.06)}
    .tile .n{font-weight:850; line-height:1.1}
    .tile .s{font-size:12px; color:rgba(255,255,255,.62)}
    .tile .meta{display:flex; gap:6px; flex-wrap:wrap; margin-top:2px}
    .tile .meta .m{
      font-size:11px; padding:3px 6px;
      border:1px solid rgba(255,255,255,.10);
      border-radius:999px;
      background:rgba(0,0,0,.18);
      color:rgba(255,255,255,.72);
    }

    /* Modal */
    .modalMask{
      position:fixed; inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modal{
      width:min(980px, 100%);
      max-height:min(86vh, 900px);
      overflow:hidden;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(20,30,50,.96), rgba(10,16,28,.96));
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
    }
    .modalHd{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; justify-content:space-between; gap:10px; align-items:center;
    }
    .modalHd .ttl{font-weight:900}
    .modalBd{
      padding:12px 14px;
      overflow:auto;
      min-height:0;
    }
    .modalFt{
      padding:12px 14px;
      border-top:1px solid rgba(255,255,255,.10);
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      background:rgba(255,255,255,.02);
    }
    .muted{color:var(--muted)}
    .dangerTxt{color:var(--danger)}
    .okTxt{color:var(--good)}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .hide{display:none!important}
  
.rarity5{color:#ff4d4f;font-weight:700}
.rarity4{color:#ff9c2a;font-weight:700}
.rarity3{color:#a56eff;font-weight:700}
.rarity2{color:#38d47a;font-weight:700}
.rarity1{color:#e6e6e6;font-weight:700}

</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="t">优化自B站UP小白的路11的龙胤版档修改器 0123456y更新</div>
    </div>
    <div class="actions">
      <button class="btn primary" id="btnImportHero">📁 导入 Hero</button>
      <button class="btn good" id="btnImportSave">🧩 导入 Save</button>
      <button class="btn warn" id="btnExportHero">⬇️ 导出 Hero</button>
      <button class="btn warn" id="btnExportSave">⬇️ 导出 Save</button>
      <button class="btn" id="btnBackup">🗂️ 一键备份（原始）</button>
      <span class="pill" id="statusPill">未加载</span>
    </div>
  </div>

  <div class="app">
    <!-- 左侧 -->
    <div class="left card">
      <div class="hd">
        <div class="h">人物列表</div>
        <div class="pill" id="heroCountPill">0</div>
      </div>

      <div class="search">
        <input class="in" id="heroSearch" placeholder="搜索：姓名 / ID / 战力 / 关键词" />
        <button class="btn ghost" id="btnClearSearch">清空</button>
      </div>

      <div class="heroListWrap" id="heroList"></div>
    </div>

    <!-- 右侧 -->
    <div class="right card">
      <div class="hd">
        <div class="h">
          编辑面板：
          <span class="pill" id="curHeroPill">未选择</span>
        </div>
        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="hero">人物</div>
          <div class="tab" data-tab="items">物品</div>
          <div class="tab" data-tab="skills">武功</div>
          <div class="tab" data-tab="team">队友</div>
          <div class="tab" data-tab="time">时间</div>
          <div class="tab" data-tab="raw">Raw</div>
        </div>
      </div>

      <div class="mainScroll" id="mainScroll">
        <div class="section" id="tab_hero"></div>
        <div class="section hide" id="tab_items"></div>
        <div class="section hide" id="tab_skills"></div>
        <div class="section hide" id="tab_team"></div>
        <div class="section hide" id="tab_time"></div>
        <div class="section hide" id="tab_raw"></div>
      </div>
    </div>
  </div>

  <!-- file inputs -->
  <input id="fileHero" type="file" class="hide" />
  <input id="fileSave" type="file" class="hide" />

  <!-- Modal -->
  <div class="modalMask" id="modalMask">
    <div class="modal">
      <div class="modalHd">
        <div class="ttl" id="modalTitle">选择</div>
        <div class="row">
          <button class="btn" id="modalClose">关闭</button>
        </div>
      </div>
      <div class="modalBd" id="modalBody"></div>
      <div class="modalFt" id="modalFooter">
        <div class="muted" id="modalHint">提示</div>
        <div class="row" id="modalActions"></div>
      </div>
    </div>
  </div>

    <script>
    /***********************
     *  数据与工具函数
     ***********************/
    const $ = (sel, el=document)=>el.querySelector(sel);
    const $$ = (sel, el=document)=>Array.from(el.querySelectorAll(sel));
    const clamp = (n, a, b)=>Math.max(a, Math.min(b, n));
    const deepClone = (o)=>JSON.parse(JSON.stringify(o));
    const safeNum = (v, d=0)=> (typeof v === "number" && !Number.isNaN(v)) ? v : (typeof v === "string" && v.trim()!=="" && !Number.isNaN(Number(v)) ? Number(v) : d);

    // 名字规则：优先 heroName；若 heroName 不以 family 开头才拼接
    function getDisplayName(h){
      if (!h) return "???";
      const n = (h?.heroName ?? "").toString();
      const f = (h?.heroFamilyName ?? "").toString();
      if(!n && f) return f;
      if(!f) return n || "???";
      return (f + n) || "???";
    }

    // 战力：严格使用 fightScore
    function getFightScore(h){
      if (!h) return 0;
      const v = h?.fightScore;
      return safeNum(v, 0);
    }

    // 角色标签（左侧列表展示用）
    function heroTags(h){
      if (!h) return [];
      const tags = [];
      tags.push(h?.dead ? {t:"死亡", c:"danger"} : {t:"存活", c:"good"});
      tags.push(h?.isFemale ? {t:"女", c:"warn"} : {t:"男", c:"gray"});
      tags.push(h?.hide ? {t:"隐藏", c:"gray"} : null);
      tags.push(h?.recruitAble ? {t:"可招募", c:"good"} : null);
      tags.push(h?.inTeam ? {t:"在队", c:"good"} : null);
      return tags.filter(Boolean);
    }

    // 属（baseAttri/maxAttri）名称映射（0~5）
    const ATTR_NAMES = ["力道","灵巧","智力","意志","体质","经脉"];

    // 武（baseFightSkill/maxFightSkill）索引映射：你的存档是 9 项
    const FIGHT_SKILL_NAMES_9 = ["内功","轻功","绝技","拳掌","剑法","刀法","长兵","奇门","射术"];

    // 技（baseLivingSkill/maxLivingSkill）先给常见 9 项（如与你版本顺序不一致，可再调整）
    const LIVING_SKILL_NAMES_9 = ["医术","炼丹","锻造","厨艺","读书","口才","杂艺","采集","驯养"];

    // 门派职位 heroForceLv 显示
    const FORCE_LV_CN = {
      5:"掌门",
      4:"长老",
      3:"亲传弟子",
      2:"正式弟子",
      1:"入门弟子",
      0:"外门弟子"
    };

    // heroSpeAddData（0~69）中文映射（用于物品附加属性下拉）
    const SPE_ATTR_NAMES = [
      "力道","灵巧","智力","意志","体制","经脉","内功","轻功","绝技","掌法",
      "剑法","刀法","长兵","奇门","射术",
      "内功威力%","轻功威力%","绝技威力%","掌法威力%","剑法威力%","刀法威力%","长兵威力%","奇门威力%","射术威力%",
      "医术","毒书","学识","口才","采伐","木植","锻造","炼丹","烹饪",

    function tagOptionsHTML(selected){
      const sel = (selected===undefined || selected===null) ? "" : String(selected);
      const opts = [`<option value="">（无）</option>`];
      const keys = Object.keys(TAG_NAMES).map(Number).sort((a,b)=>a-b);
      for(const i of keys){
        const lab = `${i} · ${TAG_NAMES[i]}`;
        opts.push(`<option value="${i}" ${String(i)===sel ? "selected":""}>${escapeHTML(lab)}</option>`);
      }
      if(sel!=="" && !opts.some(o=>o.includes(`value="${sel}"`))){
        opts.push(`<option value="${sel}" selected>${sel} · 未知天赋</option>`);
      }
      return opts.join("");
    }

    /***********************

     ***********************/
    function buildItemLibraryFromHero(heroArr){
      const map = new Map();
      for(const h of heroArr){
        if (h == null) continue; // 跳过 null 人物
        const all = h?.itemListData?.allItem;
        if(!Array.isArray(all)) continue;
        for(const it of all){
          if(!it || typeof it !== "object") continue;
          const itemID = safeNum(it.itemID, -1);
          const name = (it.name ?? "").toString();
          const type = safeNum(it.type, -1);
          const subType = safeNum(it.subType, -1);
          const rareLv = safeNum(it.rareLv, 0);
          const itemLv = safeNum(it.itemLv, 0);
          const key = `${itemID}__${name}__${type}__${subType}`;
          if(!map.has(key)){
            map.set(key, {
              key, itemID, name, type, subType, rareLv, itemLv,
              template: deepClone(it),
              cat: guessItemCat(it)
            });
          }
        }
      }
      const arr = Array.from(map.values());
      arr.sort((a,b)=>{
        if(b.rareLv !== a.rareLv) return b.rareLv - a.rareLv;
        if(b.itemLv !== a.itemLv) return b.itemLv - a.itemLv;
        return (a.name||"").localeCompare(b.name||"", "zh");
      });
      try{
        localStorage.setItem("hero_editor_itemLibrary_v1", JSON.stringify(arr.map(x=>({
          key:x.key, itemID:x.itemID, name:x.name, type:x.type, subType:x.subType, rareLv:x.rareLv, itemLv:x.itemLv, template:x.template, cat:x.cat
        }))));
      }catch(_){}
      return arr;
    }

    function buildSkillLibraryFromSave(saveObj){
      // 深度遍历：找 {name, bookData:{skillID}}
      const out = [];
      const seen = new Map(); // skillID -> name（出现次数不重要）
      function walk(o){
        if(Array.isArray(o)){
          for(const v of o) walk(v);
          return;
        }
        if(o && typeof o === "object"){
          if(o.bookData && typeof o.bookData === "object" && Number.isInteger(o.bookData.skillID) && typeof o.name === "string"){
            const sid = o.bookData.skillID;
            const nm = o.name.trim();
            if(nm && !seen.has(sid)) seen.set(sid, nm);
          }
          for(const k of Object.keys(o)) walk(o[k]);
        }
      }
      walk(saveObj);

      for(const [sid, nm] of seen.entries()){
        out.push({skillID:sid, name:nm, typeGuess: guessSkillTypeByName(nm)});
      }
      out.sort((a,b)=> (a.typeGuess||"").localeCompare(b.typeGuess||"") || (a.name||"").localeCompare(b.name||"", "zh") || a.skillID - b.skillID);

      try{
        localStorage.setItem("hero_editor_skillLibrary_v1", JSON.stringify(out));
      }catch(_){}
      return out;
    }

        if(il){

        if(sl){
          const arr = JSON.parse(sl);
          if(Array.isArray(arr)) skillLibrary = arr;
        }
      }catch(_){}
    }

      const max  = Array.isArray(h.maxLivingSkill)  ? h.maxLivingSkill  : (h.maxLivingSkill  = new Array(9).fill(0));

      const open = openFolds.has("live") ? "open" : "";

      const names = (base.length===9) ? LIVING_SKILL_NAMES_9 : base.map((_,i)=>"技"+i);

      const chks = names.map((nm, i)=>{
        const b = safeNum(base[i],0), m = safeNum(max[i],0);

                <div class="label">最大</div>
                <input class="field small" type="number" data-f="max" value="${safeNum(max[i],0)}"/>
              </div>
            </div>

      return `
        <div class="fold ${open}" data-fold="live">
          <div class="foldHead">
            <div class="foldTitle">技（基础/最大）<span class="mini">生活技艺（9项）</span></div>
            <div class="mini">${open ? "已展开":"点击展开"}</div>
          </div>
          <div class="foldBody">
            <div class="row">

            <div class="chkGrid" id="adv_live_chks">${chks}</div>
            <div class="editGrid" id="adv_live_edits">${edits || `<div class="help">未勾选任何项。</div>`}</div>

    // 渲染：天赋（heroTagData，最多20个 tagID）
    function getHeroTagIDs(h){
      if (!h) return [];
      const arr = Array.isArray(h.heroTagData) ? h.heroTagData : (h.heroTagData = []);
      const ids = [];
      for(const x of arr){
        if(Number.isInteger(x)) ids.push(x);
        else if(x && typeof x==="object" && Number.isInteger(x.tagID)) ids.push(x.tagID);

      if (!h) return '';

      const ids = getHeroTagIDs(h);

            <div style="height:10px"></div>
            <div class="editGrid" style="grid-template-columns:1fr 1fr; gap:10px" id="tag_list">${inputs || `<div class="help">暂无天赋</div>`}</div>

    // 天赋搜索函数
    function searchTagByName(keyword){
      if(!keyword || typeof keyword !== "string") return null;
      const kw = keyword.trim().toLowerCase();
      if(!kw) return null;
      const keys = Object.keys(TAG_NAMES).map(Number);
      for(const id of keys){
        const name = TAG_NAMES[id].toLowerCase();
        if(name.includes(kw) || kw.includes(name)){
          return id;
        }
      }
      for(const id of keys){
        const name = TAG_NAMES[id].toLowerCase();
        if(name.startsWith(kw)){
          return id;
        }
      }
      return null;
    }

    // 绑定天赋搜索按钮事件
    function bindTagSearchEvents(){
      const h = heroData?.[curHeroIdx];
      if(!h) return;
      const ids = getHeroTagIDs(h);
      const count = ids.length;
      for(let i=0;i<count;i++){
        const btn = $(`#tag_search_btn_${i}`);
        const searchInput = $(`#tag_search_${i}`);
        const sel = $(`#tag_sel_${i}`);
        const delBtn = $(`#tag_del_${i}`);
        if(btn && searchInput && sel){
          btn.onclick = ()=>{
            const kw = searchInput.value || "";
            const found = searchTagByName(kw);
            if(found !== null){
              sel.value = found;
              toast(`已找到: ${found} · ${TAG_NAMES[found]} ✅`);
            } else {
              toast("未找到匹配的天赋");
            }
          };
          searchInput.onkeydown = (e)=>{
            if(e.key === "Enter"){
              btn.click();
            }
          };
        }
        if(delBtn){
          delBtn.onclick = ()=>{
            if(Array.isArray(h.heroTagData)){
              h.heroTagData.splice(i, 1);
              renderHeroTab();
              toast("已删除天赋 ✅");
            }
          };
        }
      }
    }

    // 高级展开复选框事件绑定（重渲染后再绑定）
    function bindAdvHandlers(){
      $$("#tab_hero input[type=checkbox][data-adv]").forEach(ch=>{
        ch.onchange = ()=>{
          const group = ch.dataset.adv;
          const i = Number(ch.dataset.i);
          const set = (group==="attr") ? advAttrSel : (group==="fight") ? advFightSel : advLiveSel;
          if(ch.checked) set.add(i);
          else set.delete(i);
          // 重新渲染但保留折叠状态
          renderHeroTab();
        };
      });

      const h = heroData?.[curHeroIdx];
      if(!h) return;

      const applyEdits = (group)=>{
        const baseKey = group==="attr" ? "baseAttri" : group==="fight" ? "baseFightSkill" : "baseLivingSkill";
        const maxKey  = group==="attr" ? "maxAttri"  : group==="fight" ? "maxFightSkill"  : "maxLivingSkill";
        const base = h[baseKey], max = h[maxKey];
        const blocks = $$(`#tab_hero .editItem[data-edit="${group}"]`);
        for(const b of blocks){
          const idx = Number(b.dataset.i);
          const baseIn = b.querySelector('input[data-f="base"]');
          const maxIn  = b.querySelector('input[data-f="max"]');
          base[idx] = safeNum(baseIn.value, base[idx]);
          max[idx]  = safeNum(maxIn.value, max[idx]);
        }
        renderHeroTab();
        toast("已应用单项修改 ✅");
      };

      const ba = $("#btn_attr_apply");
      if(ba) ba.onclick = ()=>applyEdits("attr");
      const bf = $("#btn_fight_apply");
      if(bf) bf.onclick = ()=>applyEdits("fight");
      const bl = $("#btn_live_apply");
      if(bl) bl.onclick = ()=>applyEdits("live");

      // 一键上限按钮
      const bam = $("#btn_attr_max");
      if(bam) bam.onclick = ()=>{
        if(!Array.isArray(h.maxAttri)) h.maxAttri = [0,0,0,0,0,0];
        for(let i=0;i<h.maxAttri.length;i++) h.maxAttri[i] = 120;
        renderHeroTab();
        toast("已将属上限设为 120 ✅");
      };
      const bfm = $("#btn_fight_max");
      if(bfm) bfm.onclick = ()=>{
        if(!Array.isArray(h.maxFightSkill)) h.maxFightSkill = new Array(9).fill(0);
        for(let i=0;i<h.maxFightSkill.length;i++) h.maxFightSkill[i] = 120;
        renderHeroTab();
        toast("已将武上限设为 120 ✅");
      };
      const blm = $("#btn_live_max");
      if(blm) blm.onclick = ()=>{
        if(!Array.isArray(h.maxLivingSkill)) h.maxLivingSkill = new Array(9).fill(0);
        for(let i=0;i<h.maxLivingSkill.length;i++) h.maxLivingSkill[i] = 100;
        renderHeroTab();
        toast("已将技上限设为 100 ✅");
      };

      // 天赋
      const bt = $("#btn_apply_tags");
      if(bt) bt.onclick = ()=>{
        if(!Array.isArray(h.heroTagData)) h.heroTagData = [];
        const cur = Array.isArray(h.heroTagData) ? h.heroTagData : [];
        const out = [];
        const tagCount = cur.length;
        for(let i=0;i<tagCount;i++){
          const v = $("#tag_sel_"+i)?.value;
          if(v===undefined) continue;
          const n = (v==="" || v===null) ? null : safeNum(v, null);
          if(n===null || Number.isNaN(n)) continue;
          const old = cur[i];
          if(old && typeof old==="object"){
            out.push({...old, tagID:n});
          }else{
            out.push({tagID:n});
          }
        }
        h.heroTagData = out;
        renderHeroTab();
        toast("已应用天赋修改 ✅");
      };
      const bc = $("#btn_clear_tags");
      if(bc) bc.onclick = ()=>{
        h.heroTagData = [];
        renderHeroTab();
        toast("已清空天赋 ✅");
      };
      // 添加天赋按钮
      const badd = $("#btn_add_tag");
      if(badd) badd.onclick = ()=>{
        if(!Array.isArray(h.heroTagData)) h.heroTagData = [];
        if(h.heroTagData.length >= 30){
          toast("已达上限 30 个天赋");
          return;
        }
        h.heroTagData.push({tagID: 0});
        renderHeroTab();
        toast("已添加新天赋 ✅");
      };
    }

      el.innerHTML = `

    function speOptionsHTML(selected, includeExt=true){
      const sel = (selected===undefined || selected===null) ? "" : String(selected);
      const opts = [`<option value="">（无）</option>`];
      for(let i=0;i<SPE_ATTR_NAMES.length;i++){
        const lab = `${i} · ${speAttrLabel(i)}`;
        opts.push(`<option value="${i}" ${String(i)===sel ? "selected":""}>${escapeHTML(lab)}</option>`);
      }
      if(includeExt){
        const extKeys = Object.keys(SPE_ATTR_NAMES_EXT).map(Number).sort((a,b)=>a-b);
        for(const i of extKeys){
          const lab = `${i} · ${speAttrLabel(i)}`;
          opts.push(`<option value="${i}" ${String(i)===sel ? "selected":""}>${escapeHTML(lab)}</option>`);
        }
      }
      if(sel!=="" && !opts.some(o=>o.includes(`value="${sel}"`))){
        opts.push(`<option value="${sel}" selected>${sel} · 属性${sel}</option>`);
      }
      return opts.join("");
    }

    function getItemSpeAddPairs(it){
      // 优先 it.baseAddData.heroSpeAddData；若不存在则尝试 equipmentData.baseAddData.heroSpeAddData
      const try1 = it?.baseAddData?.heroSpeAddData;
      const try2 = it?.equipmentData?.baseAddData?.heroSpeAddData;
      const src = (try1 && typeof try1==="object") ? try1 : (try2 && typeof try2==="object") ? try2 : null;
      if(!src) return [];
      const pairs = Object.entries(src)
        .filter(([k,v])=>k!==undefined && k!==null && k!=="" && (typeof v==="number" || typeof v==="string"))
        .map(([k,v])=>({k:String(k), v:safeNum(v,0)}));
      // 按 key 数字排序
      pairs.sort((a,b)=>safeNum(a.k,0)-safeNum(b.k,0));
      return pairs.slice(0,5);
    }

    function applyItemSpeAddPairs(it, pairs){
      const obj = {};
      for(const p of pairs){
        if(p.k===undefined || p.k===null || p.k==="") continue;
        obj[String(p.k)] = safeNum(p.v, 0);
      }
      // 默认写回 it.baseAddData.heroSpeAddData（若原本在 equipmentData.baseAddData，则也同步一份，兼容不同版本结构）
      if(!it.baseAddData || typeof it.baseAddData!=="object") it.baseAddData = {};
      it.baseAddData.heroSpeAddData = obj;

      if(it.equipmentData && typeof it.equipmentData==="object"){
        if(!it.equipmentData.baseAddData || typeof it.equipmentData.baseAddData!=="object") it.equipmentData.baseAddData = {};
        it.equipmentData.baseAddData.heroSpeAddData = obj;
      }
    }

    // 获取物品的 extraAddData.heroSpeAddData 数据
    function getItemExtraAddPairs(it){
      const src = it?.equipmentData?.extraAddData?.heroSpeAddData;
      if(!src || typeof src!=="object") return [];
      const pairs = Object.entries(src)
        .filter(([k,v])=>k!==undefined && k!==null && k!=="" && (typeof v==="number" || typeof v==="string"))
        .map(([k,v])=>({k:String(k), v:safeNum(v,0)}));
      pairs.sort((a,b)=>safeNum(a.k,0)-safeNum(b.k,0));
      return pairs.slice(0,10);
    }

    // 应用物品的 extraAddData.heroSpeAddData 修改
    function applyItemExtraAddPairs(it, pairs){
      const obj = {};
      for(const p of pairs){
        if(p.k===undefined || p.k===null || p.k==="") continue;
        obj[String(p.k)] = safeNum(p.v, 0);
      }
      if(!it.equipmentData || typeof it.equipmentData!=="object") it.equipmentData = {};
      if(!it.equipmentData.extraAddData || typeof it.equipmentData.extraAddData!=="object") it.equipmentData.extraAddData = {};
      it.equipmentData.extraAddData.heroSpeAddData = obj;
    }

        typeSpecificHTML = `

              </div>

          </div>
          <div style="height:10px"></div>
          <div class="subcard" style="border-radius:14px">
            <div class="shd"><div style="font-weight:900">基础附加属性（最多 5 条）</div></div>
            <div class="sbd">
              <div class="help">装备的基础属性加成（力道、灵巧、剑法威力等）。</div>

              for(const p of mdPairs) mdObj[p.k] = p.v;
              if(Object.keys(mdObj).length > 0){
                if(!it.materialData.extraAddData || typeof it.materialData.extraAddData!=="object"){

                }
                it.materialData.extraAddData.heroSpeAddData = mdObj;
              }
            }
            // type 6: 马匹
            else if(itemType === 6){
              if(!it.horseData || typeof it.horseData!=="object") it.horseData = {};

    // 确保物品是"未装备的新物品"状态
    function ensureNewItemState(item){
      if(!item || typeof item !== "object") return item;
      item.isNew = true;
      item.equiped = false;
      if(item.equipmentData && typeof item.equipmentData === "object"){
        item.equipmentData.equiped = false;
      }
      if(item.horseData && typeof item.horseData === "object"){
        item.horseData.equiped = false;
      }
      return item;
    }

      };
      return m[k] || "其他";
    }

      $("#btnAddMate").onclick = ()=>openMatePicker(h);
      $("#btnClearMates").onclick = ()=>{
        if(!confirm("确定清空当前人物队友列表？")) return;
        for(const id of h.teamMates){
          const mate = heroData?.find(x => x != null && safeNum(x.heroID,-999) === id);
          if(mate){
            mate.inTeam = false;
            mate.teamLeader = -1;
          }
        }
        h.teamMates = [];
        renderTeamTab();
        renderHeroList();
        toast("已清空队伍 ✅");
      };

      // 事件委托
      el.onclick = (e)=>{
        const b = e.target.closest("button[data-act]");
        if(!b) return;
        const id = Number(b.dataset.id);
        if(b.dataset.act==="kickMate"){
          const idx = h.teamMates.indexOf(id);
          if(idx>=0) h.teamMates.splice(idx,1);
          const mate = heroData?.find(x => x != null && safeNum(x.heroID,-999) === id);
          if(mate){
            mate.inTeam = false;
            mate.teamLeader = -1;
          }
          renderTeamTab();
          renderHeroList();
          toast("已离队");
        }
      };
    }

    function openMatePicker(leader){
      const leaderID = safeNum(leader.heroID, curHeroIdx);
      let q = "";

      const cand = (heroData || [])
        .filter(x => x != null && safeNum(x.heroID,-1) !== leaderID)
        .map(x=>({
          hero:x,
          id:safeNum(x.heroID,-1),
          name:getDisplayName(x),
          fs:getFightScore(x),
          dead:!!x.dead,
          hide:!!x.hide,
          inTeam:!!x.inTeam
        }))
        .sort((a,b)=>b.fs-a.fs);

      function render(){
        const filtered = cand.filter(c=>{
          if(!q) return true;
          const t = `${c.name} ${c.id} ${c.fs}`.toLowerCase();
          return t.includes(q);
        }).slice(0, 900);

        const tiles = filtered.map(c=>`
          <div class="tile" data-id="${c.id}">
            <div class="n">${escapeHTML(c.name||"")}</div>
            <div class="s mono">ID:${c.id} · 战力:${Math.round(c.fs*10)/10}</div>
            <div class="meta">
              ${c.dead ? `<span class="m">死亡</span>`:""}
              ${c.hide ? `<span class="m">隐藏</span>`:""}
              ${c.inTeam ? `<span class="m">已在队</span>`:""}
            </div>
          </div>
        `).join("");

        openModal({
          title:"添加队友入队（按战力降序）",
          bodyHTML: `
            <div class="pickerBar">
              <input class="field" id="mp_q" placeholder="搜索：姓名 / ID / 战力" value="${escapeHTML(q)}" />
            </div>
            <div class="gridPicker" id="mp_grid">${tiles || `<div class="help">没有匹配项</div>`}</div>
          `,
          hint:"点击格子添加队友。若对方已在队，会强制改为跟随当前队长。",
          actions:[
            {text:"关闭", onClick:()=>closeModal()},
          ]
        });

        $("#mp_q").focus();
        $("#mp_q").oninput = (e)=>{ q = e.target.value.trim().toLowerCase(); render(); };
        $("#mp_grid").onclick = (e)=>{
          const t = e.target.closest(".tile");
          if(!t) return;
          const id = Number(t.dataset.id);

          if(!leader.teamMates.includes(id)) leader.teamMates.push(id);

          const mate = heroData?.find(x => x != null && safeNum(x.heroID,-999) === id);
          if(mate){
            mate.inTeam = true;
            mate.teamLeader = leaderID;
          }
          closeModal();
          renderTeamTab();
          renderHeroList();
          toast("已添加队友 ✅");
        };
      }

      render();
    }

    /***********************
     *  Save 时间页（worldTime）
     ***********************/
    function renderTimeTab(){
      const el = $("#tab_time");
      el.innerHTML = "";

      if(!saveData || typeof saveData!=="object"){
        el.innerHTML = `<div class="help">请先导入 Save 文件（用于解析技能库 + 修改 worldTime）。</div>`;
        return;
      }
      if(!saveData.worldTime || typeof saveData.worldTime!=="object"){
        saveData.worldTime = {year:1, month:1, day:1};
      }
      const wt = saveData.worldTime;

      el.innerHTML = `
        <div class="subcard">
          <div class="shd">
            <div style="font-weight:900">时间（Save.worldTime）</div>
            <div class="pill">当前：${safeNum(wt.year,1)}年 ${safeNum(wt.month,1)}月 ${safeNum(wt.day,1)}日</div>
          </div>
          <div class="sbd">
            <div class="help">Save 文件不只是技能库，还包含时间字段：<span class="mono">worldTime: {year, month, day}</span>。修改后请点击右上角“导出 Save”。</div>
            <div style="height:10px"></div>
            <div class="kv3">
              <div>
                <div class="label">year</div>
                <input class="field num" type="number" id="t_year" value="${safeNum(wt.year,1)}" />
              </div>
              <div>
                <div class="label">month</div>
                <input class="field num" type="number" id="t_month" value="${safeNum(wt.month,1)}" />
              </div>
              <div>
                <div class="label">day</div>
                <input class="field num" type="number" id="t_day" value="${safeNum(wt.day,1)}" />
              </div>
            </div>
            <div style="height:10px"></div>
            <div class="row">
              <button class="btn primary" id="btnApplyTime">✅ 应用时间修改</button>
              <button class="btn" id="btnResetTime">↩️ 恢复为原始时间</button>
            </div>
          </div>
        </div>
      `;

      $("#btnApplyTime").onclick = ()=>{
        wt.year = safeNum($("#t_year").value, wt.year);
        wt.month = safeNum($("#t_month").value, wt.month);
        wt.day = safeNum($("#t_day").value, wt.day);
        renderTimeTab();
        toast("已应用时间修改 ✅");
      };

      $("#btnResetTime").onclick = ()=>{
        if(saveDataOrig?.worldTime){
          saveData.worldTime = deepClone(saveDataOrig.worldTime);
          renderTimeTab();
          toast("已恢复原始时间 ✅");
        }else{
          toast("没有原始 Save 备份可恢复");
        }
      };
    }

    /***********************
     *  Raw 页（Hero 当前人物）
     ***********************/
    function renderRawTab(){
      const el = $("#tab_raw");
      el.innerHTML = "";
      if(!Array.isArray(heroData)){
        el.innerHTML = `<div class="help">未导入 Hero 存档。</div>`;
        return;
      }
      if(curHeroIdx<0 || !heroData[curHeroIdx]){
        el.innerHTML = `<div class="help">请先选择人物。</div>`;
        return;
      }
      el.innerHTML = `
        <div class="subcard">
          <div class="shd">
            <div style="font-weight:900">Raw（只读预览 + 快速复制）</div>
          </div>
          <div class="sbd">
            <div class="help">这里显示的是当前人物 JSON（只读）。导出会保存你在可视化面板做的修改。</div>
            <div style="height:10px"></div>
            <textarea class="field mono" id="rawText" style="height:420px; resize:vertical" readonly></textarea>
            <div style="height:10px"></div>
            <button class="btn" id="btnCopyRaw">复制当前人物 JSON</button>
          </div>
        </div>
      `;
      const h = heroData[curHeroIdx];
      $("#rawText").value = JSON.stringify(h, null, 2);
      $("#btnCopyRaw").onclick = async ()=>{
        try{
          await navigator.clipboard.writeText($("#rawText").value);
          toast("已复制 ✅");
        }catch(_){
          toast("复制失败（浏览器限制）");
        }
      };
    }

    /***********************
     *  总渲染
     ***********************/
    function renderAll(){
      renderHeroList();
      renderHeroTab();
      renderItemsTab();
      renderSkillsTab();
      renderTeamTab();
      renderTimeTab();
      renderRawTab();
    }

    /***********************
     *  事件：导入 / 导出 / 备份
     ***********************/
    $("#btnImportHero").onclick = ()=>$("#fileHero").click();
    $("#btnImportSave").onclick = ()=>$("#fileSave").click();

    $("#fileHero").addEventListener("change", async (e)=>{
      const f = e.target.files?.[0];
      e.target.value = "";
      if(!f) return;
      try{
        const txt = await readTextFile(f);
        const json = JSON.parse(txt);

        if(!Array.isArray(json)) throw new Error("Hero 文件不是人物数组（JSON list）");

        heroFileName = f.name || "Hero";
        heroDataOrig = deepClone(json);
        heroData = json;
        // 设置 curHeroIdx 为第一个有效人物的索引
        curHeroIdx = heroData.findIndex(h => h != null);
        if (curHeroIdx === -1) curHeroIdx = 0;

        // 物品库：全量解析 & 缓存
        itemLibrary = buildItemLibraryFromHero(heroData);

        setStatus();
        renderAll();
        toast("Hero 导入成功 ✅");
      }catch(err){
        alert("导入 Hero 失败：" + (err?.message || err));
      }
    });

    $("#fileSave").addEventListener("change", async (e)=>{
      const f = e.target.files?.[0];
      e.target.value = "";
      if(!f) return;
      try{
        const txt = await readTextFile(f);
        const json = JSON.parse(txt);

        saveFileName = f.name || "Save";
        saveDataOrig = deepClone(json);
        saveData = json;

        skillLibrary = buildSkillLibraryFromSave(saveData);
        renderSkillsTab();
        renderTimeTab();
        setStatus();
        toast(`Save 导入成功：技能库 ${skillLibrary.length} 条 ✅`);
      }catch(err){
        alert("导入 Save 失败：" + (err?.message || err));
      }
    });

    $("#btnExportHero").onclick = ()=>{
      if(!heroData) return alert("未导入 Hero");
      const out = JSON.stringify(heroData);
      downloadText(heroFileName, out);
      toast("已导出 Hero ✅");
    };

    $("#btnExportSave").onclick = ()=>{
      if(!saveData) return alert("未导入 Save");
      const out = JSON.stringify(saveData);
      downloadText(saveFileName, out);
      toast("已导出 Save ✅");
    };

    $("#btnBackup").onclick = ()=>{
      const hasHero = !!heroDataOrig;
      const hasSave = !!saveDataOrig;

      if(!hasHero && !hasSave){
        alert("未导入 Hero/Save，无法备份");
        return;
      }

      // 一键对两个文件进行原始备份（分别下载）
      if(hasHero){
        downloadText((heroFileName || "Hero") + ".bak", JSON.stringify(heroDataOrig));
      }
      if(hasSave){
        downloadText((saveFileName || "Save") + ".bak", JSON.stringify(saveDataOrig));
      }
      toast("已一键备份原始文件 ✅");
    };

    // 左侧搜索
    $("#heroSearch").addEventListener("input", ()=>renderHeroList());
    $("#btnClearSearch").onclick = ()=>{
      $("#heroSearch").value = "";
      renderHeroList();
    };

    // 初始 UI
    setStatus();
    $("#tab_hero").innerHTML = `<div class="help">请点击右上角“导入 Hero / Save”。</div>`;
  
// 自定义添加物品
document.addEventListener("click",function(e){
  if(e.target && e.target.id==="btnAddItemCustom"){
    const h = heroData?.[curHeroIdx];
    if(!h) return;
    if(!h.itemListData) h.itemListData = {money:0, weight:0, maxWeight:0, allItem:[]};
    if(!Array.isArray(h.itemListData.allItem)) h.itemListData.allItem = [];
    const id = prompt("输入 itemID");
    if(id===null) return;
    const type = prompt("type（默认0）","0");
    const sub = prompt("subType（默认0）","0");
    h.itemListData.allItem.push(ensureNewItemState({
      itemID:Number(id),
      type:Number(type||0),
      subType:Number(sub||0),
      name:"自定义物品",
      value:0,
      itemLv:0,
      rareLv:1,
      weight:0,
      isNew:true,
      equiped:false,
      checkName:null,
      describe:null,
      poisonNum:0.0,
      poisonNumDetected:false,
      equipmentData:null,
      medFoodData:null,
      bookData:null,
      treasureData:null,
      materialData:null,
      horseData:null
    }));
    renderItemsTab();
    toast("已添加自定义物品 ✅");
  }
});

// 自定义添加武功
document.addEventListener("click",function(e){
  if(e.target && e.target.id==="btnAddSkillCustom"){
    const h = heroData?.[curHeroIdx];
    if(!h) return;
    const sid = prompt("输入 skillID");
    if(sid===null) return;
    if(h.kungfuSkills.some(x=>x.skillID==Number(sid))){
      alert("已存在该武功");
      return;
    }
    h.kungfuSkills.push(makeKungfuSkill(Number(sid)));
    renderSkillsTab();
  }
});

</script>
</body>
