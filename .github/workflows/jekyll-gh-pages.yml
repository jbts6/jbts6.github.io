# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Build all projects
        id: build
        run: |
          # 遍历所有一级目录
          for dir in */; do
            if [ -f "${dir}package.json" ]; then
              echo "Building $dir..."
              cd "$dir"
              npm install
              npm run build
              cd ..
            fi
          done

          mkdir -p public   # 确保 public 目录存在
          for dir in */; do
            project_name=$(basename "$dir")   # 去掉末尾斜杠，得到纯目录名
            if [ -d "${dir}dist" ]; then
              echo "Moving contents of $dir/dist to public/$project_name/"
              # 创建目标目录
              mkdir -p "public/$project_name"
              # 移动 dist 下的所有内容（包括隐藏文件）到目标目录
              mv "${dir}dist"/* "public/$project_name/" 2>/dev/null || true
            fi
          done
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./public
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
