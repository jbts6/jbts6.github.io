name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build all projects
        id: build
        run: |
          # 遍历所有一级目录
          for dir in */; do
            if [ -f "${dir}package.json" ]; then
              echo "Building $dir..."
              cd "$dir"
              npm install
              npm run build
              cd ..
            fi
          done

          mkdir -p public   # 确保 public 目录存在
          for dir in */; do
            project_name=$(basename "$dir")   # 去掉末尾斜杠，得到纯目录名
            if [ -d "${dir}dist" ]; then
              echo "Moving contents of $dir/dist to public/$project_name/"
              # 创建目标目录
              mkdir -p "public/$project_name"
              # 移动 dist 下的所有内容（包括隐藏文件）到目标目录
              mv "${dir}dist"/* "public/$project_name/" 2>/dev/null || true
            fi
          done

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        id: deployment
        with:
          path: public/   # 部署合并后的 public 目录
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4